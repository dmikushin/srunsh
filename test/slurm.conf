ClusterName=srunsh-test
SlurmctldHost=controller

MpiDefault=none
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld
SlurmUser=root
SlurmdUser=root

# Allow node to override configured hardware values
SlurmdParameters=config_overrides

# Scheduling
SchedulerType=sched/builtin
SelectType=select/linear

# Logging
SlurmctldLogFile=/var/log/slurmctld.log
SlurmdLogFile=/var/log/slurmd.log

# Timers — fast for testing
SlurmctldTimeout=30
SlurmdTimeout=30
InactiveLimit=0
MinJobAge=10
KillWait=5
Waittime=0

# Nodes and partitions
NodeName=compute1 CPUs=1 RealMemory=512 State=UNKNOWN
NodeName=compute2 CPUs=1 RealMemory=512 State=UNKNOWN
PartitionName=test Nodes=compute1,compute2 Default=YES MaxTime=INFINITE State=UP OverSubscribe=YES
